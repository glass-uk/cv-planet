<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Peter Cross — CV Planet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Lets the page run by just opening it on a static server.
       When run through Vite, the locally-installed `three` is used instead. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <style>
    :root {
      --ink: #3a352e;
      --muted: #8a8073;
      --paper: #e9f1dd;
      --line: rgba(58, 53, 46, 0.12);
      --accent: #d98a4a;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: var(--paper);
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; touch-action: none; }

    /* ── Overlay layer ── */
    .ui { position: fixed; z-index: 5; }
    .ui-noclick { pointer-events: none; }
    .ui-click { pointer-events: auto; }

    /* top-left identity */
    #identity { top: 28px; left: 30px; max-width: 46vw; }
    #identity .name {
      font-size: 30px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.05;
    }
    #identity .role {
      margin-top: 4px; font-size: 15px; font-weight: 500; color: var(--muted);
    }
    #identity .tagline {
      margin-top: 14px; font-size: 13px; font-weight: 500; color: var(--ink);
      opacity: 0.65;
    }

    /* top-right landmark list */
    #landmarks {
      top: 26px; right: 26px; display: flex; flex-direction: column; gap: 7px;
      align-items: flex-end;
    }
    #landmarks .lm-label {
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 3px; font-weight: 600;
    }
    .lm {
      display: flex; align-items: center; gap: 9px;
      border: 1px solid var(--line); background: rgba(255,255,255,0.55);
      backdrop-filter: blur(6px);
      padding: 8px 13px; border-radius: 999px; cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: 500; color: var(--ink);
      transition: background 0.18s, transform 0.18s, border-color 0.18s;
    }
    .lm:hover { background: #fff; transform: translateX(-3px); }
    .lm.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .lm .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
    .lm.active .dot { box-shadow: 0 0 0 2px rgba(255,255,255,0.5); }

    /* bottom-left hint */
    #hint {
      bottom: 26px; left: 30px; font-size: 12.5px; color: var(--muted);
      font-weight: 500; line-height: 1.7;
    }
    #hint kbd {
      font-family: inherit; font-weight: 600; color: var(--ink);
      background: rgba(255,255,255,0.7); border: 1px solid var(--line);
      border-radius: 5px; padding: 1px 6px; margin: 0 1px; font-size: 11.5px;
    }

    /* now-viewing pill, bottom-center */
    #viewing {
      bottom: 28px; left: 50%; transform: translateX(-50%) translateY(8px);
      background: var(--ink); color: #fff; padding: 9px 18px; border-radius: 999px;
      font-size: 13px; font-weight: 600; letter-spacing: 0.01em;
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      display: flex; align-items: center; gap: 9px;
    }
    #viewing.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #viewing .dot { width: 8px; height: 8px; border-radius: 50%; }

    /* touch d-pad */
    #pad {
      bottom: 26px; right: 26px; display: none;
      grid-template-columns: repeat(3, 56px); grid-template-rows: repeat(2, 56px);
      gap: 8px;
    }
    #pad button {
      border: 1px solid var(--line); background: rgba(255,255,255,0.6);
      backdrop-filter: blur(6px); border-radius: 14px; font-size: 22px;
      color: var(--ink); cursor: pointer; -webkit-user-select: none; user-select: none;
      display: flex; align-items: center; justify-content: center;
    }
    #pad button:active { background: var(--ink); color: #fff; }
    #pad .up { grid-column: 2; grid-row: 1; }
    #pad .left { grid-column: 1; grid-row: 2; }
    #pad .down { grid-column: 2; grid-row: 2; }
    #pad .right { grid-column: 3; grid-row: 2; }

    /* loader */
    #loader {
      position: fixed; inset: 0; z-index: 20; background: var(--paper);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; transition: opacity 0.6s; font-weight: 500; color: var(--muted);
    }
    #loader.hide { opacity: 0; pointer-events: none; }
    .spinner {
      width: 30px; height: 30px; border-radius: 50%;
      border: 3px solid var(--line); border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #compass { top: 132px; left: 30px; width: 120px; height: 120px; }
    #mute {
      top: 262px; left: 30px; font-family: inherit; font-size: 12px; font-weight: 600;
      color: var(--ink); background: rgba(255,255,255,0.55); backdrop-filter: blur(6px);
      border: 1px solid var(--line); border-radius: 999px; padding: 7px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 7px;
    }
    #mute:hover { background: #fff; }
    #mute .ic { width: 8px; height: 8px; border-radius: 50%; background: #2fa37c; }
    #mute.muted .ic { background: #c0392b; }

    /* photo-mode toggle, sits next to sound */
    #photo {
      top: 262px; left: 138px; font-family: inherit; font-size: 12px; font-weight: 600;
      color: var(--ink); background: rgba(255,255,255,0.55); backdrop-filter: blur(6px);
      border: 1px solid var(--line); border-radius: 999px; padding: 7px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 7px;
    }
    #photo:hover { background: #fff; }
    #photo .ic { font-size: 11px; }

    /* guided-tour CTA at the top of the landmark list */
    .lm.tour {
      background: var(--accent); color: #fff; border-color: var(--accent);
      font-weight: 600; margin-bottom: 3px;
    }
    .lm.tour:hover { background: var(--accent); filter: brightness(1.06); transform: translateX(-3px); }
    .lm.tour.active { background: var(--ink); border-color: var(--ink); filter: none; }
    .lm.tour .ic { font-size: 10px; }

    /* weather toggle, left rail next to photo */
    #weather {
      top: 262px; left: 226px; font-family: inherit; font-size: 12px; font-weight: 600;
      color: var(--ink); background: rgba(255,255,255,0.55); backdrop-filter: blur(6px);
      border: 1px solid var(--line); border-radius: 999px; padding: 7px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 7px;
    }
    #weather:hover { background: #fff; }
    #weather.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    #weather .wi { font-size: 12px; line-height: 1; }

    /* buildings-flattened score */
    #score {
      top: 300px; left: 30px; display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 600; color: var(--muted);
      opacity: 0; transition: opacity 0.4s;
    }
    #score.show { opacity: 1; }
    #score .num {
      font-size: 15px; font-weight: 700; color: var(--ink);
      font-variant-numeric: tabular-nums;
    }
    #score .ic { font-size: 13px; }

    /* vehicle picker (left rail, under the score) */
    #vehicles {
      top: 338px; left: 30px; display: flex; flex-wrap: wrap; gap: 7px; max-width: 264px;
    }
    #vehicles .veh-label {
      flex-basis: 100%; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 1px; font-weight: 600;
    }
    .veh {
      display: flex; align-items: center; gap: 7px;
      border: 1px solid var(--line); background: rgba(255,255,255,0.55);
      backdrop-filter: blur(6px); padding: 7px 12px; border-radius: 999px; cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 500; color: var(--ink);
      transition: background 0.18s, transform 0.18s, border-color 0.18s;
    }
    .veh:hover { background: #fff; transform: translateY(-2px); }
    .veh.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .veh .vi { font-size: 14px; line-height: 1; }

    /* boost flame on the pad */
    #pad .boost { grid-column: 1; grid-row: 1; font-size: 20px; }

    /* photo mode: hide the HUD, keep only the exit hint */
    body.photo .ui:not(#photo-exit):not(#photo) { opacity: 0 !important; pointer-events: none !important; }
    body.photo #photo { background: var(--ink); color: #fff; }
    #photo-exit {
      bottom: 26px; left: 50%; transform: translateX(-50%);
      font-size: 12px; font-weight: 600; color: var(--ink);
      background: rgba(255,255,255,0.7); backdrop-filter: blur(6px);
      border: 1px solid var(--line); border-radius: 999px; padding: 7px 16px;
      opacity: 0; transition: opacity 0.4s; pointer-events: none;
    }
    body.photo #photo-exit { opacity: 1; }

    #start {
      inset: 0; z-index: 30; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(120% 120% at 50% 30%, rgba(233,241,221,0.5), rgba(58,53,46,0.55));
      backdrop-filter: blur(3px); transition: opacity 0.6s; pointer-events: auto;
    }
    #start.hide { opacity: 0; pointer-events: none; }
    .start-card {
      text-align: center; background: rgba(253,251,247,0.94); border: 1px solid var(--line);
      border-radius: 18px; padding: 38px 48px; box-shadow: 0 24px 60px rgba(58,53,46,0.28); max-width: 440px;
    }
    .start-eyebrow { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
    .start-name { font-size: 40px; font-weight: 700; letter-spacing: -0.02em; margin: 10px 0 2px; line-height: 1.0; }
    .start-role { font-size: 16px; color: var(--muted); font-weight: 500; }
    #startBtn {
      margin-top: 26px; font-family: inherit; font-size: 16px; font-weight: 600;
      background: var(--accent); color: #fff; border: none; border-radius: 999px;
      padding: 13px 30px; cursor: pointer; transition: transform 0.15s, filter 0.15s;
    }
    #startBtn:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .start-controls { margin-top: 20px; font-size: 12px; color: var(--muted); }
    .start-controls kbd {
      font-family: inherit; font-weight: 600; color: var(--ink); background: rgba(58,53,46,0.06);
      border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; margin: 0 1px;
    }

    @media (max-width: 640px) {
      #identity .name { font-size: 23px; }
      #landmarks .lm { padding: 7px 11px; font-size: 13px; }
      #hint { display: none; }
    }
    @media (pointer: coarse) {
      #pad { display: grid; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="identity" class="ui ui-noclick">
    <div class="name"></div>
    <div class="role"></div>
    <div class="tagline"></div>
  </div>

  <div id="landmarks" class="ui ui-click">
    <div class="lm-label">Landmarks</div>
  </div>

  <div id="hint" class="ui ui-noclick">
    <div><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or arrows to drive</div>
    <div>Click a landmark to travel · drag to rotate</div>
    <div><kbd>Shift</kbd> boost · <kbd>P</kbd> photo · <kbd>V</kbd> vehicle</div>
  </div>

  <div id="viewing" class="ui ui-noclick"><span class="dot"></span><span class="vt"></span></div>

  <div id="pad" class="ui ui-click">
    <button class="boost" data-dir="boost" aria-label="boost">⚡</button>
    <button class="up" data-dir="up" aria-label="forward">▲</button>
    <button class="left" data-dir="left" aria-label="left">◀</button>
    <button class="down" data-dir="down" aria-label="back">▼</button>
    <button class="right" data-dir="right" aria-label="right">▶</button>
  </div>

  <canvas id="compass" class="ui ui-noclick" width="240" height="240"></canvas>
  <button id="mute" class="ui ui-click"><span class="ic"></span><span class="mt">Sound on</span></button>
  <button id="photo" class="ui ui-click"><span class="ic">▣</span><span class="pt">Photo</span></button>
  <button id="weather" class="ui ui-click"></button>
  <div id="score" class="ui ui-noclick"><span class="ic">🏗️</span><span class="num">0</span><span>flattened</span></div>
  <div id="vehicles" class="ui ui-click"><div class="veh-label">Vehicle</div></div>
  <div id="photo-exit" class="ui ui-noclick">Photo mode · drag to frame · press <kbd>P</kbd> to exit</div>

  <div id="start" class="ui">
    <div class="start-card">
      <div class="start-eyebrow">An interactive CV</div>
      <h1 class="start-name"></h1>
      <div class="start-role"></div>
      <button id="startBtn">Drive ▶</button>
      <div class="start-controls"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> drive · drag to rotate · click signs to travel</div>
    </div>
  </div>

  <div id="loader"><div class="spinner"></div><div>Spinning up the planet…</div></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
